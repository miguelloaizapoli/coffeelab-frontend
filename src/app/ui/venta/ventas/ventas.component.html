<div class="ventas-container">
    <div class="container-fluid mt-5">
        <h1 class="page-title">Ventas</h1>

        <div class="controls-section">
            <button class="btn btn-primary create-btn" routerLink="/ventas/create">
                <span class="btn-icon">➕</span>
                Registrar venta
            </button>
        </div>
    </div>

    <div class="container-fluid table-section">
        <div class="table-wrapper">
            <table class="table table-responsive-md">
                <thead class="table-header">
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-client">Cliente</th>
                        <th class="col-total">Total</th>
                        <th class="col-date">Fecha</th>
                        <th class="col-actions">Acciones</th>
                    </tr>
                </thead>
                <tbody class="table-body">
                    @for (venta of ventas; track venta.id) {
                        <tr class="table-row">
                            <td class="cell-id">{{ venta.id }}</td>
                            <td class="cell-client">
                                <span class="client-badge">{{ venta.cliente_nombre }}</span>
                            </td>
                            <td class="cell-total">${{ venta.total }}</td>
                            <td class="cell-date">{{ venta.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
                            <td class="cell-actions">
                                <button class="btn-action btn-delete"
                                    (click)="deleteVenta(venta.id)"
                                    title="Eliminar venta">
                                    🗑️
                                </button>
                            </td>
                        </tr>
                    } @empty {
                        <tr class="table-empty">
                            <td colspan="5" class="empty-message">
                                No hay ventas registradas aún.
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
