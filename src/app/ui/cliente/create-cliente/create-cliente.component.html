<div class="container mt-4">
    <h2 class="text-center">Crear Cliente</h2>

    <form [formGroup]="createClienteForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
            <label>Nombre</label>
            <input class="form-control" formControlName="nombre">
            @if (createClienteForm.get('nombre')?.touched && createClienteForm.get('nombre')?.invalid) {
            <small class="text-danger">El nombre es obligatorio</small>
            }
        </div>

        <div class="mb-3">
            <label>Teléfono</label>
            <input class="form-control" formControlName="telefono">
        </div>

        <div class="d-flex justify-content-between">
            <button class="btn btn-secondary" type="button" (click)="goBack()">
                Volver
            </button>
            <button class="btn btn-success" type="submit" [disabled]="createClienteForm.invalid">
                Crear
            </button>
        </div>

    </form>
</div>
