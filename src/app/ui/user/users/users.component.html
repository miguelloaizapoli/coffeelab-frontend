<div class="users-container">
    <div class="container-fluid mt-5">
        <h1 class="page-title">Usuarios</h1>

        <div class="info-section">
            <div class="info-box">
                <span class="info-icon">ℹ️</span>
                <span class="info-text">Gestión de usuarios y permisos del sistema</span>
            </div>
        </div>
    </div>

    <div class="container-fluid table-section">
        <div class="table-wrapper">
            <table class="table table-responsive-md">
                <thead class="table-header">
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-name">Nombre</th>
                        <th class="col-email">Email</th>
                        <th class="col-role">Rol</th>
                        <th class="col-actions">Acciones</th>
                    </tr>
                </thead>
                <tbody class="table-body">
                    @for (user of users; track user.id) {
                        <tr class="table-row">
                            <td class="cell-id">{{ user.id }}</td>
                            <td class="cell-name">
                                <span class="name-badge">{{ user.name }}</span>
                            </td>
                            <td class="cell-email">{{ user.email }}</td>
                            <td class="cell-role">
                                <span class="role-badge" [class.admin]="user.role === 'admin'" [class.empleado]="user.role === 'empleado'">
                                    {{ user.role }}
                                </span>
                            </td>
                            <td class="cell-actions">
                                <button class="btn-action btn-edit"
                                    [routerLink]="['/users/update', user.id]"
                                    title="Editar usuario">
                                    ✏️
                                </button>
                                <button class="btn-action btn-delete"
                                    (click)="deleteUser(user.id)"
                                    title="Eliminar usuario">
                                    🗑️
                                </button>
                            </td>
                        </tr>
                    } @empty {
                        <tr class="table-empty">
                            <td colspan="5" class="empty-message">
                                No hay usuarios registrados.
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
