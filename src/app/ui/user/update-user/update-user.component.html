<div class="container mt-4">
    <h2 class="text-center">Actualizar Usuario</h2>

    <form [formGroup]="updateUserForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
            <label>Nombre</label>
            <input class="form-control" formControlName="name">
            @if (updateUserForm.get('name')?.touched && updateUserForm.get('name')?.invalid) {
            <small class="text-danger">El nombre es obligatorio</small>
            }
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
            @if (updateUserForm.get('email')?.touched && updateUserForm.get('email')?.invalid) {
            <small class="text-danger">Email inválido</small>
            }
        </div>

        <div class="mb-3">
            <label>Rol</label>
            <select class="form-control" formControlName="role">
                <option value="empleado">Empleado</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="d-flex justify-content-between">
            <button class="btn btn-secondary" type="button" (click)="goBack()">
                Volver
            </button>
            <button class="btn btn-success" type="submit" [disabled]="updateUserForm.invalid">
                Actualizar
            </button>
        </div>

    </form>
</div>
