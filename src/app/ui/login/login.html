<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 350px;">

        <h3 class="text-center mb-4">Iniciar sesión</h3>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" formControlName="email">

                @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
                <small class="text-danger">Correo inválido</small>
                }
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" formControlName="password">

                @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
                <small class="text-danger">La contraseña es obligatoria</small>
                }
            </div>

            <!-- Botón -->
            <button class="btn btn-primary w-100" [disabled]="loginForm.invalid">
                Ingresar
            </button>

            <div class="text-center mt-3">
                <small>
                    ¿No tienes cuenta?
                    <a routerLink="/register" class="text-primary fw-bold">
                        Regístrate
                    </a>
                </small>
            </div>

        </form>

    </div>
</div>
